name: Gatefile PR Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  gatefile-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          # The Action reads the trusted policy snapshot from the PR base SHA.
          fetch-depth: 0
          persist-credentials: false

      - name: Gatefile PR gate
        uses: StephenBickel/gatefile/.github/actions/gatefile-pr-gate@9c193dd39c7c1e7b20ca3f8c42f0a72860b15814
        with:
          plan-path: .plan/plan.json
          trusted-policy-ref: ${{ github.event.pull_request.base.sha }}
          trusted-policy-path: gatefile.config.json
          # Set this repository Actions variable to the SHA-256 digest of the
          # exact gatefile.config.json bytes trusted on the base branch.
          trusted-policy-sha256: ${{ vars.GATEFILE_POLICY_SHA256 }}
          node-version: "22"
          artifact-name: gatefile-artifacts
