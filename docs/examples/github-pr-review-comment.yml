name: PR Gatefile Review (Sticky Comment + Gate)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  gatefile-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build gatefile CLI
        run: npm run build

      - name: Verify plan artifact exists
        run: test -f .plan/plan.json

      - name: Produce inspect/verify/dry-run artifacts
        shell: bash
        run: |
          node dist/cli.js inspect-plan .plan/plan.json --json > inspect-report.json
          node dist/cli.js verify-plan .plan/plan.json > verify-report.json
          node dist/cli.js apply-plan .plan/plan.json --dry-run > dry-run-report.json

      - name: Render gatefile PR review markdown
        run: |
          node dist/cli.js render-pr-comment .plan/plan.json \
            --inspect inspect-report.json \
            --verify verify-report.json \
            --dry-run dry-run-report.json \
            --out gatefile-pr-comment.md

      - name: Post sticky PR comment
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2
        with:
          header: gatefile-review
          path: gatefile-pr-comment.md

      - name: Enforce plan ready state
        shell: bash
        run: |
          node -e 'const fs=require("node:fs");const verify=JSON.parse(fs.readFileSync("verify-report.json","utf8"));const dryRun=JSON.parse(fs.readFileSync("dry-run-report.json","utf8"));if(verify.status!=="ready"||dryRun.staticGate?.passed!==true){console.error("Gatefile gate failed:",verify.blockers.join("; "),"signerTrust="+(verify.signerTrust?.status||"unknown"),"staticGate="+(dryRun.staticGate?.passed===true?"passed":"failed"));process.exit(1);}console.log("Gatefile gate passed:",verify.planId,"signerTrust="+(verify.signerTrust?.status||"not-configured"),"staticGate=passed");'

      - name: Upload review artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: gatefile-review-artifacts
          path: |
            .plan/plan.json
            inspect-report.json
            verify-report.json
            dry-run-report.json
            gatefile-pr-comment.md
