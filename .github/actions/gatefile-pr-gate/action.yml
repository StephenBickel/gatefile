name: Gatefile PR Gate
description: Verify a committed Gatefile plan with action-owned code and preserve bound evidence.
inputs:
  plan-path:
    description: Repository-relative path to the committed plan artifact.
    required: false
    default: .plan/plan.json
  inspect-report-path:
    description: Repository-relative output path for inspect JSON evidence.
    required: false
    default: inspect-report.json
  verify-report-path:
    description: Repository-relative output path for verification JSON evidence.
    required: false
    default: verify-report.json
  dry-run-report-path:
    description: Repository-relative output path for dry-run JSON evidence.
    required: false
    default: dry-run-report.json
  manifest-path:
    description: Repository-relative output path for the bound evidence manifest.
    required: false
    default: gatefile-manifest.json
  trusted-policy-ref:
    description: Full trusted Git commit SHA containing gatefile.config.json.
    required: false
  trusted-policy-path:
    description: Repository-relative policy path at trusted-policy-ref.
    required: false
    default: gatefile.config.json
  trusted-policy-sha256:
    description: Caller-pinned SHA-256 digest of the trusted policy bytes.
    required: false
  allow-unsigned-no-policy:
    description: Explicitly allow evaluation without trusted signer policy (unsafe; alpha evaluation only).
    required: false
    default: "false"
  node-version:
    description: Node.js version used to build and execute the action-owned Gatefile checkout.
    required: false
    default: "22"
  artifact-name:
    description: Name used for uploaded Gatefile evidence.
    required: false
    default: gatefile-artifacts
outputs:
  inspect-report-path:
    description: Path to inspect JSON evidence.
    value: ${{ steps.gate.outputs.inspect-report-path }}
  verify-report-path:
    description: Path to verification JSON evidence.
    value: ${{ steps.gate.outputs.verify-report-path }}
  dry-run-report-path:
    description: Path to dry-run JSON evidence.
    value: ${{ steps.gate.outputs.dry-run-report-path }}
  manifest-path:
    description: Path to the Gatefile evidence manifest.
    value: ${{ steps.gate.outputs.manifest-path }}
  status:
    description: Verification status reported by Gatefile.
    value: ${{ steps.gate.outputs.status }}
runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}

    - name: Generate Gatefile evidence with action-owned code
      id: gate
      shell: bash
      env:
        INPUT_PLAN_PATH: ${{ inputs.plan-path }}
        INPUT_INSPECT_REPORT_PATH: ${{ inputs.inspect-report-path }}
        INPUT_VERIFY_REPORT_PATH: ${{ inputs.verify-report-path }}
        INPUT_DRY_RUN_REPORT_PATH: ${{ inputs.dry-run-report-path }}
        INPUT_MANIFEST_PATH: ${{ inputs.manifest-path }}
        INPUT_TRUSTED_POLICY_REF: ${{ inputs.trusted-policy-ref }}
        INPUT_TRUSTED_POLICY_PATH: ${{ inputs.trusted-policy-path }}
        INPUT_TRUSTED_POLICY_SHA256: ${{ inputs.trusted-policy-sha256 }}
        INPUT_ALLOW_UNSIGNED_NO_POLICY: ${{ inputs.allow-unsigned-no-policy }}
      run: '"${GITHUB_ACTION_PATH}/run.sh"'

    - name: Upload Gatefile evidence
      if: ${{ always() }}
      uses: actions/upload-artifact@v5
      with:
        name: ${{ inputs.artifact-name }}
        if-no-files-found: error
        path: |
          ${{ inputs.plan-path }}
          ${{ inputs.inspect-report-path }}
          ${{ inputs.verify-report-path }}
          ${{ inputs.dry-run-report-path }}
          ${{ inputs.manifest-path }}

    - name: Enforce Gatefile readiness
      if: ${{ always() }}
      shell: bash
      env:
        VERIFY_REPORT_PATH: ${{ inputs.verify-report-path }}
        DRY_RUN_REPORT_PATH: ${{ inputs.dry-run-report-path }}
      run: node "${GITHUB_ACTION_PATH}/enforce.js" "${VERIFY_REPORT_PATH}" "${DRY_RUN_REPORT_PATH}"
