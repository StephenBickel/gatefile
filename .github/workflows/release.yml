name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm
    steps:
      - name: Checkout the published release
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Verify release identity and trusted history
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
        run: |
          set -euo pipefail

          version="$(node -p 'require("./package.json").version')"
          expected_tag="v${version}"
          if [[ "$RELEASE_TAG" != "$expected_tag" ]]; then
            echo "Release tag $RELEASE_TAG does not match package version $expected_tag" >&2
            exit 1
          fi

          expected_prerelease=false
          if [[ "$version" == *-* ]]; then
            expected_prerelease=true
          fi
          if [[ "$RELEASE_PRERELEASE" != "$expected_prerelease" ]]; then
            echo "GitHub prerelease metadata does not match package version $version" >&2
            exit 1
          fi

          git fetch --no-tags origin main:refs/remotes/origin/main
          release_commit="$(git rev-parse "${RELEASE_TAG}^{commit}")"
          if [[ "$(git rev-parse HEAD)" != "$release_commit" ]]; then
            echo "Checked-out commit does not match release tag $RELEASE_TAG" >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "$release_commit" refs/remotes/origin/main; then
            echo "Release commit is not reachable from origin/main" >&2
            exit 1
          fi

      - name: Require npm trusted-publishing support
        shell: bash
        run: |
          set -euo pipefail
          npm_version="$(npm --version)"
          node - "$npm_version" <<'NODE'
          const actual = process.argv[2].split('.').slice(0, 3).map(Number);
          const required = [11, 5, 1];
          if (actual.length !== 3 || actual.some((part) => !Number.isInteger(part) || part < 0)) {
            console.error(`Invalid npm version: ${process.argv[2]}`);
            process.exit(1);
          }
          for (let index = 0; index < required.length; index += 1) {
            if (actual[index] > required[index]) process.exit(0);
            if (actual[index] < required[index]) {
              console.error(`npm ${process.argv[2]} is too old; trusted publishing requires npm >=11.5.1`);
              process.exit(1);
            }
          }
          NODE

      - name: Install locked dependencies
        run: npm ci --ignore-scripts

      - name: Audit dependencies
        run: npm audit

      - name: Publish to npm with trusted OIDC
        run: npm publish --access public --tag next --provenance
